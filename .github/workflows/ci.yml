name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure
        run: python scripts/check_repository.py

      - name: Validate Salesforce metadata XML
        run: python scripts/validate_metadata.py
